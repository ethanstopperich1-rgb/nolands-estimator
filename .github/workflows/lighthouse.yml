name: Lighthouse CI

# Runs Lighthouse against the Vercel preview deploy on every PR.
# Catches Tailwind v4 / Next.js 16-canary regressions on LCP, CLS, INP
# before they ship to production. Per the Wave 1 research note: Vercel's
# own Speed Insights is the field-data source of truth for SEO ranking
# (https://vercel.com/blog/how-core-web-vitals-affect-seo), but lab data
# from Lighthouse is the cheaper "catch the regression in code review"
# tool. They complement each other.
#
# Why this didn't ship sooner: the Vercel preview URL isn't deterministic
# — it changes per deploy. The `treosh/lighthouse-ci-action` flow + the
# Vercel deployment-status webhook resolves that.
#
# Budgets in lighthouserc.json. CI fails the PR if any URL regresses
# beyond the threshold; ops sees the score delta as a PR comment.

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  # Required for the Lighthouse action to comment the score table.

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    # Wait up to 5 minutes for the Vercel preview deploy to land.
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Wait for Vercel preview deployment
        uses: patrickedqvist/wait-for-vercel-preview@v1.3.1
        id: vercel
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          max_timeout: 300
          check_interval: 10
          # Match Vercel project's preview alias pattern. The action
          # waits for the deployment's `state` to be READY before
          # returning the URL.

      - name: Run Lighthouse against preview URL
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            ${{ steps.vercel.outputs.url }}/
            ${{ steps.vercel.outputs.url }}/privacy
            ${{ steps.vercel.outputs.url }}/terms
          # Run 3 times per URL, take the median. Reduces variance from
          # cold-start CDN cache and Vercel function warmup.
          runs: 3
          configPath: ./lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
          # Posts the score-delta table as a PR comment.

      - name: Comment summary on PR
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '⚠️ Lighthouse CI failed. Check the workflow logs for the per-URL score breakdown. Most common causes: font-loading regression, JS bundle size growth, or a CLS-inducing image swap.'
            });
